services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: powerbi_monitor
      POSTGRES_PASSWORD: powerbi_monitor
      POSTGRES_DB: powerbi_monitor
    ports:
      - "5432:5432"
    volumes:
      - powerbi_monitor_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerbi_monitor -d powerbi_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  powerbi_monitor_data:
